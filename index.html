<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segnapunti Burraco Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            /* Palette PURE BLACK Modern */
            --bg-main: #000000;
            --bg-card: #121212;
            --bg-input: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00e5ff; /* Cyan Neon */
            --success: #00e676; /* Green Neon */
            --danger: #ff1744;  /* Red Neon */
            --gold: #ffc400;
            --orange: #ff9100;
            --blue: #2979ff;
            --purple: #d500f9;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent), #b2fef7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 15px rgba(0, 229, 255, 0.4);
            letter-spacing: 1px;
        }

        .btn-add-team {
            background: none;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .btn-add-team:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .teams-container {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap; /* Permette alle squadre extra di andare a capo su schermi piccoli */
            justify-content: center;
        }

        .team-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            min-width: 320px; /* Larghezza minima per card */
            max-width: 400px; /* Larghezza massima */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInCard 0.5s ease;
        }
        
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .team-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .team-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 10px;
        }

        .team-title {
            text-align: center;
            margin: 0;
            color: var(--text-main);
            font-weight: 600;
            outline: none;
            transition: color 0.3s;
            padding: 0 25px;
        }

        .team-title:focus {
            color: var(--accent);
        }
        
        .edit-icon {
            position: absolute;
            right: 0;
            font-size: 0.8em;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .total-score {
            font-size: 5em;
            text-align: center;
            font-weight: 700;
            margin: 10px 0 20px 0;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            font-variant-numeric: tabular-nums;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .action-btn {
            font-family: 'Poppins', sans-serif;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .action-btn:hover::after { background: rgba(255,255,255,0.1); }
        .action-btn:active { transform: translateY(1px); }
        
        /* Colori bottoni */
        .btn-pulito { background-color: var(--gold); text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .btn-sporco { background-color: var(--orange); }
        .btn-chiusura { background-color: var(--success); }
        .btn-pozzetto { background-color: var(--danger); }
        
        .custom-points {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .custom-points input {
            flex: 1;
            padding: 12px 15px;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .custom-points input::placeholder { color: var(--text-muted); }
        .custom-points input:focus { border-color: var(--accent); background-color: rgba(0, 229, 255, 0.03); }

        .btn-calc { justify-content: center; flex: 1; }
        .btn-add { background-color: var(--blue); }
        .btn-sub { background-color: var(--purple); }

        .history-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .history-title {
            font-size: 0.8em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .history {
            background-color: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Stile Scrollbar Moderno */
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .history::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid transparent;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-item.positive { border-left-color: var(--success); }
        .history-item.negative { border-left-color: var(--danger); }

        .move-info { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
        .move-name { font-weight: 400; font-size: 0.85em; color: var(--text-main); }
        .move-points { font-weight: 700; font-size: 1em; margin-left: 10px; font-variant-numeric: tabular-nums;}
        .points-pos { color: var(--success); }
        .points-neg { color: var(--danger); }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1em;
            padding: 0 0 0 12px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            opacity: 0.6;
        }
        
        .btn-delete:hover { color: var(--danger); transform: scale(1.2); opacity: 1; }

        .copyright {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            width: 100%;
            max-width: 1200px;
            font-size: 0.8em;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-section { flex-direction: column; gap: 15px; text-align: center; }
            h1 { font-size: 2em; }
            .total-score { font-size: 4em; }
            .team-card { min-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Burraco Counter</h1>
        <button class="btn-add-team" onclick="addNewTeam()">
            <span>➕</span> Aggiungi Squadra
        </button>
    </div>

    <div class="teams-container" id="teamsContainer">
        </div>

    <div class="copyright">
        &copy; 2026 Salvo Furnari. Tutti i diritti riservati. Progettato per la modalità scura.
    </div>

    <script>
        // Stato dell'applicazione (temporaneo fino al reload)
        let teamsData = {};
        let teamCounter = 0;

        // Funzione per generare l'HTML di una nuova squadra
        function createTeamCardHTML(id, defaultName) {
            return `
                <div class="team-card" id="card-${id}">
                    <div class="team-header">
                        <h2 class="team-title" contenteditable="true">${defaultName}</h2>
                        <span class="edit-icon">✏️</span>
                    </div>
                    <div class="total-score" id="score-${id}">0</div>
                    
                    <div class="buttons-grid">
                        <button class="action-btn btn-pulito" onclick="addPoints(${id}, 200, '🌟 Burraco Pulito')">
                            <span>🌟 Burraco Pulito</span> <span>+200</span>
                        </button>
                        <button class="action-btn btn-sporco" onclick="addPoints(${id}, 100, '🃏 Burraco Sporco')">
                            <span>🃏 Burraco Sporco</span> <span>+100</span>
                        </button>
                        <button class="action-btn btn-chiusura" onclick="addPoints(${id}, 100, '🏁 Chiusura')">
                            <span>🏁 Chiusura</span> <span>+100</span>
                        </button>
                        <button class="action-btn btn-pozzetto" onclick="addPoints(${id}, -100, '❌ Pozzetto non preso')">
                            <span>❌ Pozzetto non preso</span> <span>-100</span>
                        </button>
                    </div>

                    <div class="custom-points">
                        <input type="number" id="input-${id}" placeholder="Punti carte...">
                        <button class="action-btn btn-calc btn-add" onclick="addCustom(${id}, true)">➕</button>
                        <button class="action-btn btn-calc btn-sub" onclick="addCustom(${id}, false)">➖</button>
                    </div>

                    <div class="history-container">
                        <div class="history-title">Storico Mosse</div>
                        <div class="history" id="history-${id}"></div>
                    </div>
                </div>
            `;
        }

        // Funzione principale per aggiungere una squadra
        function addNewTeam() {
            teamCounter++;
            const teamId = teamCounter;
            const teamName = `Squadra ${teamId}`;

            // Inizializza i dati per la nuova squadra
            teamsData[teamId] = {
                score: 0,
                moves: []
            };

            // Aggiunge l'HTML al contenitore
            const container = document.getElementById('teamsContainer');
            container.insertAdjacentHTML('beforeend', createTeamCardHTML(teamId, teamName));
        }

        // Funzioni di calcolo (aggiornate per gestire ID dinamici)
        function addPoints(teamId, points, moveName) {
            const moveId = Date.now();
            // Aggiunge la mossa in cima
            teamsData[teamId].moves.unshift({ id: moveId, points: points, name: moveName });
            updateUI(teamId);
        }

        function removeMove(teamId, moveId) {
            // Filtra via la mossa specificata
            teamsData[teamId].moves = teamsData[teamId].moves.filter(move => move.id !== moveId);
            updateUI(teamId);
        }

        function addCustom(teamId, isPositive) {
            const inputField = document.getElementById(`input-${teamId}`);
            let value = parseInt(inputField.value);
            
            if (isNaN(value) || value <= 0) return; 
            
            let points = isPositive ? value : -value;
            let moveName = isPositive ? '🧮 Carte a terra' : '📉 Carte in mano';
            
            addPoints(teamId, points, moveName);
            inputField.value = ''; // Pulisce input
        }

        // Aggiorna l'interfaccia di una specifica squadra
        function updateUI(teamId) {
            // Ricalcola totale
            let total = teamsData[teamId].moves.reduce((sum, move) => sum + move.points, 0);
            teamsData[teamId].score = total;
            document.getElementById(`score-${teamId}`).innerText = total;

            // Ridisegna lo storico
            const historyDiv = document.getElementById(`history-${teamId}`);
            historyDiv.innerHTML = ''; 

            teamsData[teamId].moves.forEach(move => {
                const item = document.createElement('div');
                const isPositive = move.points > 0;
                item.className = `history-item ${isPositive ? 'positive' : 'negative'}`;
                
                const sign = isPositive ? '+' : '';
                const pointsClass = isPositive ? 'points-pos' : 'points-neg';

                item.innerHTML = `
                    <div class="move-info">
                        <span class="move-name">${move.name}</span>
                        <span class="move-points ${pointsClass}">${sign}${move.points}</span>
                    </div>
                    <button class="btn-delete" onclick="removeMove(${teamId}, ${move.id})" title="Annulla mossa">🗑️</button>
                `;
                historyDiv.appendChild(item);
            });
        }

        // Inizializzazione: aggiunge le prime due squadre di default all'avvio
        window.onload = function() {
            addNewTeam(); // Squadra 1
            addNewTeam(); // Squadra 2
        };
    </script>
</body>
</html>
